name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build Manifest V3 extension
        run: npm run build

      - name: Create validated release artifacts
        run: npm run release

      - name: Upload unpacked extension
        uses: actions/upload-artifact@v4
        with:
          name: asterfold-chrome-unpacked
          path: release/chrome-unpacked
          if-no-files-found: error

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: asterfold-release
          path: |
            release/chrome-unpacked.zip
            release/extension-source.zip
            release/checksums.txt
          if-no-files-found: error

